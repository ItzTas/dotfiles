monitorv2 {
    output = HDMI-A-1
    mode = preferred
    position = auto
    scale = 1

    bitdepth = 10

    cm = hdr
    supports_hdr = 1

    sdrbrightness = 1
    sdrsaturation = 1.6

    sdr_min_luminance = 0.005
    sdr_max_luminance = 90
}

